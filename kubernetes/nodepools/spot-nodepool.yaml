apiVersion: karpenter.sh/v1
kind: NodePool
metadata:
  name: spot
spec:
  limits:
    cpu: "100"

  template:
    metadata:
      labels:
        workload: spot

    spec:
      nodeClassRef:
        group: karpenter.k8s.aws
        kind: EC2NodeClass
        name: default

      requirements:
      - key: kubernetes.io/arch
        operator: In
        values:
        - arm64

      - key: karpenter.sh/capacity-type
        operator: In
        values:
        - spot