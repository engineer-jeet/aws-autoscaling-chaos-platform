apiVersion: karpenter.k8s.aws/v1
kind: EC2NodeClass
metadata:
  name: default

spec:
  amiFamily: AL2023

  amiSelectorTerms:
    - alias: al2023@latest

  role: <karpenter-node-role>

  subnetSelectorTerms:
    - tags:
        karpenter.sh/discovery: <cluster-name>

  securityGroupSelectorTerms:
    - tags:
        karpenter.sh/discovery: <cluster-name>

  tags:
    Project: aws-autoscaling-chaos-platform
    Environment: dev