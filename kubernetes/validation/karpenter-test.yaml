apiVersion: apps/v1
kind: Deployment
metadata:
  name: karpenter-test

spec:
  replicas: 4

  selector:
    matchLabels:
      app: karpenter-test

  template:
    metadata:
      labels:
        app: karpenter-test

    spec:
      containers:
      - name: pause
        image: public.ecr.aws/eks-distro/kubernetes/pause:3.7

        resources:
          requests:
            cpu: "1"
            memory: "512Mi"

          limits:
            cpu: "1"
            memory: "512Mi"